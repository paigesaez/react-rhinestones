<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystals Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Georgia, serif; position: relative; background: #0f172a; }
    .page { position: relative; min-height: 400vh; }
    .crystal-glint { transition: opacity 0.2s ease-out, transform 0.2s ease-out; transform-origin: center; }
    /* Sweeping specular that tracks scroll direction — crystals feel like they turn under the light */
    .crystal-sweep {
      opacity: calc(var(--glint-t, 0) * 0.9);
      transform: translateX(calc(var(--glint-s, 0) * 7px)) translateY(calc(var(--glint-s, 0) * -2px));
      transform-box: fill-box;
      transform-origin: center;
      transition: opacity 0.15s ease-out;
    }
    /* Secondary sweep, moves opposite direction for parallax facet feel */
    .crystal-counter-sweep {
      opacity: calc(var(--glint-t, 0) * 0.55);
      transform: translateX(calc(var(--glint-s, 0) * -4px));
      transform-box: fill-box;
      transform-origin: center;
      transition: opacity 0.15s ease-out;
    }
    /* Filter chain only on lit crystals — avoids recomputing expensive drop-shadows on all 45 */
    .crystal-container.is-lit {
      filter:
        brightness(calc(1 + var(--glint-t, 0) * 1.0))
        drop-shadow(0 0 calc(2px + var(--glint-t, 0) * 14px) hsla(var(--glint-hue, 260), 70%, 75%, calc(0.15 + var(--glint-t, 0) * 0.55)))
        drop-shadow(0 0 calc(8px + var(--glint-t, 0) * 6px) hsla(var(--glint-hue, 260), 65%, 55%, calc(0.18 + var(--glint-t, 0) * 0.25)));
    }
    @keyframes crystal-float {
      0%, 100% { transform: translateY(0) rotate(0deg); filter: brightness(1); }
      33% { transform: translateY(-6px) rotate(0.8deg); filter: brightness(1.08); }
      66% { transform: translateY(2px) rotate(-0.5deg); filter: brightness(1.15); }
    }
    .crystal-gem {
      animation: crystal-float 5s ease-in-out infinite;
      animation-delay: var(--breathe-delay, 0s);
    }
    .crystal-container { pointer-events: auto; }
    .crystal-gem {
      transition: transform 0.5s ease-out, filter 0.4s ease-out;
    }
    .crystal-container:hover .crystal-gem {
      transform: translateY(3px) scale(1.03);
      filter: brightness(1.25) drop-shadow(0 0 10px hsla(var(--glint-hue, 260), 55%, 65%, 0.45));
    }
    .crystal-container { pointer-events: auto; }
    .crystal-spin {
      transition: transform 0.5s ease-out, filter 0.5s ease-out;
    }
    .crystal-container:hover .crystal-spin {
      transform: scale(1.12);
      filter: brightness(1.2)
        drop-shadow(0 0 12px hsla(var(--glint-hue, 260), 50%, 60%, 0.5));
    }
    @media (prefers-reduced-motion: reduce) {
      .crystal-gem { animation: none; }
      .crystal-glint, .crystal-sweep, .crystal-rainbow, .crystal-counter-sweep { transition: none; transform: none; }
      .crystal-container { filter: none; }
    }
  </style>
</head>
<body>
  <div class="page" id="root"></div>
  <script type="module">
    import { createRoot } from "https://esm.sh/react-dom@19/client";
    import { createElement as h, useEffect, useRef, useMemo } from "https://esm.sh/react@19";

    // Mineral tones — deeper, less neon
    const PALETTE = [
      "#7c3aed",  // violet-600 — amethyst
      "#db2777",  // pink-600 — rhodonite
      "#78909c",  // blue-grey — labradorite
      "#0891b2",  // cyan-600 — aquamarine
      "#059669",  // emerald-600 — malachite
      "#2563eb",  // blue-600 — sapphire
      "#d97706",  // amber-600 — citrine
      "#9f1239",  // rose-800 — garnet
      "#4338ca",  // indigo-700 — tanzanite
    ];

    const SIZE_CLASSES = [
      { fraction: 0.25, scaleMin: 0.7, scaleMax: 1.0, opacityMin: 0.75, opacityMax: 0.9 },
      { fraction: 0.30, scaleMin: 1.0, scaleMax: 1.5, opacityMin: 0.85, opacityMax: 0.95 },
      { fraction: 0.25, scaleMin: 1.4, scaleMax: 2.0, opacityMin: 0.9, opacityMax: 1.0 },
      { fraction: 0.20, scaleMin: 1.8, scaleMax: 3.0, opacityMin: 0.95, opacityMax: 1.0 },
    ];

    function makeRand(seed) {
      let s = seed;
      return () => { s |= 0; s = (s + 0x6d2b79f5) | 0; let t = Math.imul(s ^ (s >>> 15), 1 | s); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
    }

    function hexToHsl(hex) {
      const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b), lum = (max+min)/2;
      if (max===min) return [0,0,lum*100];
      const d = max-min, sat = lum>0.5 ? d/(2-max-min) : d/(max+min);
      let hu = 0;
      if (max===r) hu=((g-b)/d+(g<b?6:0))/6; else if (max===g) hu=((b-r)/d+2)/6; else hu=((r-g)/d+4)/6;
      return [hu*360, sat*100, lum*100];
    }

    // Helper: unique ID per crystal instance
    let _uid = 0;
    function uid() { return 'c' + (_uid++); }



    // ─── Shape 1: Classic hexagonal prism with termination point ───
    function CrystalHex(hu, s, l) {
      const id = uid();
      return h("svg", { viewBox: "0 0 80 150", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `gb${id}` }, h("feGaussianBlur", { stdDeviation: "2.5" })),
          h("filter", { id: `gb2${id}` }, h("feGaussianBlur", { stdDeviation: "1" })),
          h("filter", { id: `gb3${id}` }, h("feGaussianBlur", { stdDeviation: "4" })),
          // Glass gradient — left face (bright, transparent)
          h("linearGradient", { id: `gL${id}`, x1: "0%", y1: "0%", x2: "80%", y2: "100%" },
            h("stop", { offset: "0%", stopColor: `hsla(${hu},${Math.min(s+20,100)}%,94%,0.85)` }),
            h("stop", { offset: "40%", stopColor: `hsla(${hu},${s+10}%,80%,0.90)` }),
            h("stop", { offset: "100%", stopColor: `hsla(${hu},${s}%,55%,0.75)` }),
          ),
          // Glass gradient — center face
          h("linearGradient", { id: `gC${id}`, x1: "20%", y1: "0%", x2: "80%", y2: "100%" },
            h("stop", { offset: "0%", stopColor: `hsla(${hu+5},${s+5}%,82%,0.85)` }),
            h("stop", { offset: "50%", stopColor: `hsla(${hu+10},${s}%,60%,0.70)` }),
            h("stop", { offset: "100%", stopColor: `hsla(${hu+15},${Math.max(s-5,10)}%,38%,0.80)` }),
          ),
          // Glass gradient — right face (dark, still glassy)
          h("linearGradient", { id: `gR${id}`, x1: "100%", y1: "0%", x2: "0%", y2: "80%" },
            h("stop", { offset: "0%", stopColor: `hsla(${hu+20},${s}%,42%,0.85)` }),
            h("stop", { offset: "100%", stopColor: `hsla(${hu+25},${Math.max(s-10,10)}%,15%,0.95)` }),
          ),
          // Specular gradient for point
          h("linearGradient", { id: `gP${id}`, x1: "30%", y1: "100%", x2: "60%", y2: "0%" },
            h("stop", { offset: "0%", stopColor: `hsla(${hu},${s}%,70%,0.95)` }),
            h("stop", { offset: "50%", stopColor: `hsla(${hu-10},${s+15}%,92%,0.9)` }),
            h("stop", { offset: "100%", stopColor: "rgba(255,255,255,0.98)" }),
          ),
        ),
        // ── Deep internal refraction (visible through the glass)
        h("polygon", { points: "18,125 18,52 28,46 28,125", fill: `hsla(${hu+5},55%,88%,0.12)`, filter: `url(#gb${id})` }),
        h("polygon", { points: "30,120 42,48 50,55 38,120", fill: `hsla(${hu-10},50%,85%,0.08)`, filter: `url(#gb${id})` }),
        h("ellipse", { cx: 34, cy: 85, rx: 8, ry: 18, fill: `hsla(${hu},45%,90%,0.1)`, filter: `url(#gb${id})` }),
        // Internal rainbow caustic
        h("line", { x1: 20, y1: 50, x2: 50, y2: 120, stroke: `hsla(${(hu+180)%360},40%,80%,0.08)`, strokeWidth: 3, filter: `url(#gb${id})` }),
        // ── Column faces (glass-like low opacity)
        h("polygon", { points: "12,130 12,46 28,38 28,130", fill: `url(#gL${id})` }),
        h("polygon", { points: "28,130 28,38 54,42 54,130", fill: `url(#gC${id})` }),
        h("polygon", { points: "54,130 54,42 66,50 66,130", fill: `url(#gR${id})` }),
        // ── Termination point facets
        h("polygon", { points: "12,46 28,38 38,6", fill: `url(#gP${id})` }),
        h("polygon", { points: "28,38 54,42 38,6", fill: `hsla(${hu+5},${s+8}%,80%,0.95)` }),
        h("polygon", { points: "54,42 66,50 38,6", fill: `hsla(${hu+25},${Math.max(s-8,10)}%,20%,0.90)` }),
        // ── Edge highlights — sharp white + soft bloom
        h("line", { x1: 28, y1: 130, x2: 28, y2: 38, stroke: "white", strokeWidth: 1.2, opacity: 0.45 }),
        h("line", { x1: 28, y1: 130, x2: 28, y2: 38, stroke: `hsla(${hu},60%,92%,0.35)`, strokeWidth: 4, filter: `url(#gb2${id})` }),
        h("line", { x1: 54, y1: 130, x2: 54, y2: 42, stroke: "white", strokeWidth: 0.6, opacity: 0.21 }),
        h("line", { x1: 28, y1: 38, x2: 38, y2: 6, stroke: "white", strokeWidth: 1.1, opacity: 0.54 }),
        h("line", { x1: 28, y1: 38, x2: 38, y2: 6, stroke: `hsla(${hu},60%,95%,0.4)`, strokeWidth: 3, filter: `url(#gb2${id})` }),
        h("line", { x1: 12, y1: 46, x2: 38, y2: 6, stroke: "white", strokeWidth: 0.7, opacity: 0.3 }),
        h("line", { x1: 12, y1: 46, x2: 28, y2: 38, stroke: "white", strokeWidth: 0.5, opacity: 0.24 }),
        // ── Specular highlight — large bright patch on lit face (tracks scroll as sweep)
        h("polygon", { className: "crystal-sweep", points: "16,50 29,38 32,20 20,42", fill: "white", opacity: 0.7 }),
        h("polygon", { className: "crystal-sweep", points: "17,48 28,39 30,24 21,43", fill: "white", opacity: 0.3, filter: `url(#gb2${id})` }),
        // Thin specular streak down column (counter-sweep: slides opposite for parallax)
        h("polygon", { className: "crystal-counter-sweep", points: "17,50 22,48 22,95 17,98", fill: "white", opacity: 0.12, filter: `url(#gb2${id})` }),
        // ── Blazing tip glow
        h("circle", { cx: 37, cy: 9, r: 1.5, fill: "white", opacity: 0.6 }),
        h("circle", { cx: 37, cy: 9, r: 6, fill: "white", opacity: 0.35, filter: `url(#gb${id})` }),
        h("circle", { cx: 37, cy: 9, r: 16, fill: `hsla(${hu},55%,92%,0.1)`, filter: `url(#gb3${id})` }),
        // ── Prismatic color fringe along bright edge
        h("line", { x1: 29, y1: 38, x2: 39, y2: 6, stroke: `hsla(300,50%,80%,0.18)`, strokeWidth: 2, filter: `url(#gb2${id})` }),
        h("line", { x1: 27, y1: 38, x2: 37, y2: 6, stroke: `hsla(55,60%,85%,0.12)`, strokeWidth: 1.5, filter: `url(#gb2${id})` }),
        // Glint target
        h("circle", { cx: 28, cy: 36, r: 5, fill: "white", opacity: 0, className: "crystal-glint" }),
      );
    }

    // ─── Shape 2: Wedge — asymmetric thick slab, flat-topped ───
    function CrystalWedge(hu, s, l) {
      const id = uid();
      return h("svg", { viewBox: "0 0 70 130", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `wd${id}` }, h("feGaussianBlur", { stdDeviation: "2" })),
          h("filter", { id: `wd2${id}` }, h("feGaussianBlur", { stdDeviation: "0.8" })),
        ),
        // Thick asymmetric wedge — flat angled top, not a point
        h("polygon", { points: "8,125 5,45 15,12 40,5 45,30 45,125", fill: `hsla(${hu},${Math.min(s+18,100)}%,88%,0.75)` }),
        h("polygon", { points: "45,125 45,30 40,5 62,18 60,125", fill: `hsla(${hu+10},${s}%,55%,0.65)` }),
        // Flat angled top face
        h("polygon", { points: "15,12 40,5 62,18 45,30 5,45", fill: `hsla(${hu+5},${s+8}%,78%,0.85)` }),
        // Dark side sliver
        h("polygon", { points: "60,125 62,18 65,25 65,125", fill: `hsla(${hu+20},${Math.max(s-8,10)}%,18%,0.85)` }),
        // Edges
        h("line", { x1: 45, y1: 125, x2: 45, y2: 30, stroke: "white", strokeWidth: 0.8, opacity: 0.36 }),
        h("line", { x1: 5, y1: 45, x2: 15, y2: 12, stroke: "white", strokeWidth: 0.7, opacity: 0.33 }),
        h("line", { x1: 15, y1: 12, x2: 40, y2: 5, stroke: "white", strokeWidth: 0.6, opacity: 0.42 }),
        h("line", { x1: 40, y1: 5, x2: 62, y2: 18, stroke: "white", strokeWidth: 0.5, opacity: 0.27 }),
        h("line", { x1: 45, y1: 30, x2: 5, y2: 45, stroke: "white", strokeWidth: 0.5, opacity: 0.24 }),
        // Sweep on top face
        h("polygon", { className: "crystal-sweep", points: "18,15 38,7 42,18 12,38", fill: "white", opacity: 0.5 }),
        h("polygon", { className: "crystal-sweep", points: "20,18 36,9 40,16 14,34", fill: "white", opacity: 0.2, filter: `url(#wd2${id})` }),
        // Glow at high point
        h("circle", { cx: 38, cy: 8, r: 1.5, fill: "white", opacity: 0.6 }),
        h("circle", { cx: 38, cy: 8, r: 3, fill: "white", opacity: 0.2, filter: `url(#wd${id})` }),
        h("circle", { cx: 30, cy: 25, r: 5, fill: "white", opacity: 0, className: "crystal-glint" }),
      );
    }

    // ─── Shape 3: Double-terminated (point on both ends) ───
    function CrystalDouble(hu, s, l) {
      const id = uid();
      return h("svg", { viewBox: "0 0 70 160", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `db${id}` }, h("feGaussianBlur", { stdDeviation: "2.5" })),
          h("filter", { id: `db2${id}` }, h("feGaussianBlur", { stdDeviation: "1" })),
          h("filter", { id: `db3${id}` }, h("feGaussianBlur", { stdDeviation: "4" })),
        ),
        h("ellipse", { cx: 35, cy: 80, rx: 22, ry: 60, fill: `hsla(${hu},55%,60%,0.06)`, filter: `url(#db3${id})` }),
        // Internals
        h("polygon", { points: "16,115 16,45 24,40 24,115", fill: `hsla(${hu},50%,88%,0.1)`, filter: `url(#db${id})` }),
        h("ellipse", { cx: 32, cy: 80, rx: 7, ry: 22, fill: `hsla(${hu},40%,85%,0.08)`, filter: `url(#db${id})` }),
        // Column faces
        h("polygon", { points: "10,120 10,40 24,32 24,120", fill: `hsla(${hu},${Math.min(s+18,100)}%,92%,0.7)` }),
        h("polygon", { points: "24,120 24,32 50,36 50,120", fill: `hsla(${hu+8},${s}%,60%,0.72)` }),
        h("polygon", { points: "50,120 50,36 60,44 60,120", fill: `hsla(${hu+22},${Math.max(s-8,10)}%,18%,0.90)` }),
        // Top point
        h("polygon", { points: "10,40 24,32 34,5", fill: `hsla(${hu},${s+10}%,95%,0.88)` }),
        h("polygon", { points: "24,32 50,36 34,5", fill: `hsla(${hu+5},${s}%,78%,0.90)` }),
        h("polygon", { points: "50,36 60,44 34,5", fill: `hsla(${hu+22},${Math.max(s-8,10)}%,20%,0.85)` }),
        // Bottom point
        h("polygon", { points: "10,120 24,120 34,155", fill: `hsla(${hu},${s+5}%,88%,0.95)` }),
        h("polygon", { points: "24,120 50,120 34,155", fill: `hsla(${hu+10},${Math.max(s-5,10)}%,50%,0.70)` }),
        h("polygon", { points: "50,120 60,120 34,155", fill: `hsla(${hu+22},${Math.max(s-10,10)}%,14%,0.85)` }),
        // Edges
        h("line", { x1: 24, y1: 120, x2: 24, y2: 32, stroke: "white", strokeWidth: 1.1, opacity: 0.42 }),
        h("line", { x1: 24, y1: 120, x2: 24, y2: 32, stroke: `hsla(${hu},55%,92%,0.3)`, strokeWidth: 3.5, filter: `url(#db2${id})` }),
        h("line", { x1: 24, y1: 32, x2: 34, y2: 5, stroke: "white", strokeWidth: 1, opacity: 0.51 }),
        h("line", { x1: 10, y1: 40, x2: 34, y2: 5, stroke: "white", strokeWidth: 0.6, opacity: 0.27 }),
        h("line", { x1: 24, y1: 120, x2: 34, y2: 155, stroke: "white", strokeWidth: 0.7, opacity: 0.3 }),
        // Specular (sweeping highlights track scroll)
        h("polygon", { className: "crystal-sweep", points: "14,44 25,32 28,18 18,38", fill: "white", opacity: 0.65 }),
        h("polygon", { className: "crystal-sweep", points: "15,42 24,33 27,22 19,39", fill: "white", opacity: 0.25, filter: `url(#db2${id})` }),
        // Top tip
        h("circle", { cx: 33, cy: 8, r: 1.5, fill: "white", opacity: 0.6 }),
        h("circle", { cx: 33, cy: 8, r: 5, fill: "white", opacity: 0.3, filter: `url(#db${id})` }),
        h("line", { x1: 33, y1: 0, x2: 33, y2: 16, stroke: "white", strokeWidth: 0.5, opacity: 0.39 }),
        h("line", { x1: 26, y1: 8, x2: 40, y2: 8, stroke: "white", strokeWidth: 0.5, opacity: 0.39 }),
        // Bottom tip (subtler)
        h("circle", { cx: 33, cy: 152, r: 2, fill: "white", opacity: 0.5 }),
        h("circle", { cx: 33, cy: 152, r: 3, fill: "white", opacity: 0.15, filter: `url(#db${id})` }),
        // Prismatic
        h("line", { x1: 25, y1: 32, x2: 35, y2: 5, stroke: `hsla(300,50%,80%,0.16)`, strokeWidth: 2, filter: `url(#db2${id})` }),
        h("line", { x1: 23, y1: 32, x2: 33, y2: 5, stroke: `hsla(55,55%,85%,0.1)`, strokeWidth: 1.5, filter: `url(#db2${id})` }),
      );
    }

    // ─── Shape 4: Tabular / flat plate crystal ───
    function CrystalTabular(hu, s, l) {
      const id = uid();
      return h("svg", { viewBox: "0 0 100 90", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `tb${id}` }, h("feGaussianBlur", { stdDeviation: "2" })),
          h("filter", { id: `tb2${id}` }, h("feGaussianBlur", { stdDeviation: "0.8" })),
          h("filter", { id: `tb3${id}` }, h("feGaussianBlur", { stdDeviation: "3.5" })),
        ),
        h("ellipse", { cx: 50, cy: 50, rx: 40, ry: 30, fill: `hsla(${hu},50%,60%,0.06)`, filter: `url(#tb3${id})` }),
        // Wide flat faces — very glassy/translucent
        h("polygon", { points: "8,65 8,25 42,10 42,65", fill: `hsla(${hu},${Math.min(s+15,100)}%,92%,0.6)` }),
        h("polygon", { points: "42,65 42,10 85,18 85,65", fill: `hsla(${hu+8},${s+5}%,62%,0.65)` }),
        h("polygon", { points: "85,65 85,18 95,28 95,65", fill: `hsla(${hu+20},${Math.max(s-5,10)}%,20%,0.85)` }),
        // Top facets (shallow termination)
        h("polygon", { points: "8,25 42,10 50,5", fill: `hsla(${hu},${s+12}%,96%,0.85)` }),
        h("polygon", { points: "42,10 85,18 50,5", fill: `hsla(${hu+5},${s}%,80%,0.85)` }),
        h("polygon", { points: "85,18 95,28 50,5", fill: `hsla(${hu+20},${Math.max(s-5,10)}%,25%,0.80)` }),
        // Internal refraction — a rainbow bar visible through the flat face
        h("rect", { x: 15, y: 30, width: 30, height: 3, rx: 1.5, fill: `hsla(${(hu+120)%360},40%,80%,0.08)`, filter: `url(#tb${id})` }),
        h("rect", { x: 20, y: 45, width: 25, height: 2, rx: 1, fill: `hsla(${(hu+240)%360},35%,82%,0.06)`, filter: `url(#tb${id})` }),
        // Edges
        h("line", { x1: 42, y1: 65, x2: 42, y2: 10, stroke: "white", strokeWidth: 1, opacity: 0.42 }),
        h("line", { x1: 42, y1: 65, x2: 42, y2: 10, stroke: `hsla(${hu},55%,92%,0.3)`, strokeWidth: 3, filter: `url(#tb2${id})` }),
        h("line", { x1: 42, y1: 10, x2: 50, y2: 5, stroke: "white", strokeWidth: 0.9, opacity: 0.48 }),
        h("line", { x1: 8, y1: 25, x2: 50, y2: 5, stroke: "white", strokeWidth: 0.6, opacity: 0.3 }),
        // Big specular patch — flat crystals catch a lot of light (sweeps with scroll)
        h("polygon", { className: "crystal-sweep", points: "12,28 42,12 46,8 16,24", fill: "white", opacity: 0.6 }),
        h("polygon", { className: "crystal-sweep", points: "14,30 40,14 44,10 18,26", fill: "white", opacity: 0.25, filter: `url(#tb2${id})` }),
        // Wide specular band down face (counter-sweep)
        h("polygon", { className: "crystal-counter-sweep", points: "12,30 20,28 20,55 12,58", fill: "white", opacity: 0.1, filter: `url(#tb2${id})` }),
        // Tip glow

        h("polygon", { points: "20,80 35,72 55,78", fill: `hsla(${hu+5},${s+5}%,72%,0.7)` }),
        // Edges
        h("line", { x1: 35, y1: 72, x2: 55, y2: 8, stroke: "white", strokeWidth: 0.8, opacity: 0.39 }),
        h("line", { x1: 20, y1: 80, x2: 42, y2: 5, stroke: "white", strokeWidth: 0.6, opacity: 0.3 }),
        h("line", { x1: 35, y1: 72, x2: 20, y2: 80, stroke: "white", strokeWidth: 0.7, opacity: 0.33 }),
        h("line", { x1: 55, y1: 78, x2: 72, y2: 22, stroke: "white", strokeWidth: 0.5, opacity: 0.24 }),
        // Sweep on upper lit face
        h("polygon", { className: "crystal-sweep", points: "28,72 40,50 50,12 45,8", fill: "white", opacity: 0.45 }),
        // Tip glow
        h("circle", { cx: 52, cy: 5, r: 1.5, fill: "white", opacity: 0.6 }),
        h("circle", { cx: 52, cy: 5, r: 3, fill: "white", opacity: 0.2, filter: `url(#bn${id})` }),
        h("circle", { cx: 42, cy: 40, r: 5, fill: "white", opacity: 0, className: "crystal-glint" }),
      );
    }

    // ─── Shape 10: Tower — stepped terraces getting narrower, like bismuth ───
    function CrystalTower(hu, s, l) {
      const id = uid();
      return h("svg", { viewBox: "0 0 80 160", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `tw${id}` }, h("feGaussianBlur", { stdDeviation: "2" })),
          h("filter", { id: `tw2${id}` }, h("feGaussianBlur", { stdDeviation: "0.8" })),
        ),
        // Bottom tier — widest
        h("polygon", { points: "5,155 5,105 30,100 30,155", fill: `hsla(${hu},${Math.min(s+18,100)}%,85%,0.72)` }),
        h("polygon", { points: "30,155 30,100 65,105 65,155", fill: `hsla(${hu+10},${s}%,52%,0.65)` }),
        h("polygon", { points: "65,155 65,105 72,110 72,155", fill: `hsla(${hu+20},${Math.max(s-8,10)}%,20%,0.8)` }),
        // Step face
        h("polygon", { points: "5,105 30,100 65,105 72,110", fill: `hsla(${hu+5},${s+5}%,72%,0.7)` }),
        // Middle tier
        h("polygon", { points: "12,105 12,62 35,58 35,100", fill: `hsla(${hu+2},${Math.min(s+20,100)}%,88%,0.75)` }),
        h("polygon", { points: "35,100 35,58 58,62 58,105", fill: `hsla(${hu+12},${s}%,50%,0.68)` }),
        h("polygon", { points: "58,105 58,62 64,66 64,108", fill: `hsla(${hu+22},${Math.max(s-5,10)}%,22%,0.78)` }),
        // Step face
        h("polygon", { points: "12,62 35,58 58,62 64,66", fill: `hsla(${hu+3},${s+8}%,78%,0.72)` }),
        // Top tier — narrowest, with point
        h("polygon", { points: "18,62 18,28 38,8 38,58", fill: `hsla(${hu},${Math.min(s+22,100)}%,92%,0.8)` }),
        h("polygon", { points: "38,58 38,8 52,22 52,62", fill: `hsla(${hu+10},${s}%,55%,0.7)` }),
        h("polygon", { points: "52,62 52,22 56,28 56,64", fill: `hsla(${hu+20},${Math.max(s-5,10)}%,25%,0.75)` }),
        // Top point
        h("polygon", { points: "18,28 38,8 52,22", fill: `hsla(${hu},${s+10}%,95%,0.9)` }),
        // Edges — tier steps
        h("line", { x1: 5, y1: 105, x2: 72, y2: 110, stroke: "white", strokeWidth: 0.6, opacity: 0.24 }),
        h("line", { x1: 12, y1: 62, x2: 64, y2: 66, stroke: "white", strokeWidth: 0.6, opacity: 0.27 }),
        // Vertical edges
        h("line", { x1: 30, y1: 155, x2: 30, y2: 100, stroke: "white", strokeWidth: 0.7, opacity: 0.3 }),
        h("line", { x1: 35, y1: 100, x2: 35, y2: 58, stroke: "white", strokeWidth: 0.7, opacity: 0.33 }),
        h("line", { x1: 38, y1: 58, x2: 38, y2: 8, stroke: "white", strokeWidth: 0.8, opacity: 0.39 }),
        h("line", { x1: 18, y1: 28, x2: 38, y2: 8, stroke: "white", strokeWidth: 0.6, opacity: 0.42 }),
        // Sweep on top tier
        h("polygon", { className: "crystal-sweep", points: "20,30 36,10 38,30 22,50", fill: "white", opacity: 0.5 }),
        // Tip
        h("circle", { cx: 36, cy: 10, r: 1.5, fill: "white", opacity: 0.6 }),
        h("circle", { cx: 36, cy: 10, r: 3, fill: "white", opacity: 0.2, filter: `url(#tw${id})` }),
        h("circle", { cx: 32, cy: 35, r: 5, fill: "white", opacity: 0, className: "crystal-glint" }),
      );
    }

    // ─── Shape 11: Twin — two prisms growing at an angle ───
    function CrystalTwin(hu, s, l) {
      const id = uid();
      const hu2 = hu + 12;
      return h("svg", { viewBox: "0 0 80 150", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `tw${id}` }, h("feGaussianBlur", { stdDeviation: "2" })),
          h("filter", { id: `tw2${id}` }, h("feGaussianBlur", { stdDeviation: "0.8" })),
        ),
        // Left prism — tilted left
        h("g", { transform: "rotate(-10, 35, 130)" },
          h("polygon", { points: "10,130 10,50 22,42 22,130", fill: `hsla(${hu},${Math.min(s+18,100)}%,90%,0.72)` }),
          h("polygon", { points: "22,130 22,42 38,46 38,130", fill: `hsla(${hu+8},${s}%,58%,0.6)` }),
          h("polygon", { points: "10,50 22,42 28,12", fill: `hsla(${hu},${s+10}%,94%,0.88)` }),
          h("polygon", { points: "22,42 38,46 28,12", fill: `hsla(${hu+5},${s}%,72%,0.65)` }),
          h("line", { x1: 22, y1: 130, x2: 22, y2: 42, stroke: "white", strokeWidth: 0.8, opacity: 0.36 }),
          h("line", { x1: 22, y1: 42, x2: 28, y2: 12, stroke: "white", strokeWidth: 0.7, opacity: 0.45 }),
          h("polygon", { className: "crystal-sweep", points: "14,54 23,42 25,24 17,48", fill: "white", opacity: 0.5 }),
          h("circle", { cx: 27, cy: 14, r: 1.5, fill: "white", opacity: 0.6 }),
          h("circle", { cx: 27, cy: 14, r: 3, fill: "white", opacity: 0.2, filter: `url(#tw${id})` }),
        ),
        // Right prism — tilted right, shorter
        h("g", { transform: "rotate(8, 45, 130)" },
          h("polygon", { points: "38,130 38,65 48,58 48,130", fill: `hsla(${hu2},${Math.min(s+15,100)}%,88%,0.68)` }),
          h("polygon", { points: "48,130 48,58 62,62 62,130", fill: `hsla(${hu2+10},${s}%,52%,0.55)` }),
          h("polygon", { points: "38,65 48,58 52,32", fill: `hsla(${hu2},${s+8}%,92%,0.85)` }),
          h("polygon", { points: "48,58 62,62 52,32", fill: `hsla(${hu2+5},${s}%,68%,0.6)` }),
          h("line", { x1: 48, y1: 130, x2: 48, y2: 58, stroke: "white", strokeWidth: 0.7, opacity: 0.33 }),
          h("line", { x1: 48, y1: 58, x2: 52, y2: 32, stroke: "white", strokeWidth: 0.6, opacity: 0.42 }),
          h("circle", { cx: 51, cy: 34, r: 1.5, fill: "white", opacity: 0.5 }),
          h("circle", { cx: 51, cy: 34, r: 4, fill: "white", opacity: 0.15, filter: `url(#tw${id})` }),
        ),
        h("circle", { cx: 35, cy: 50, r: 5, fill: "white", opacity: 0, className: "crystal-glint" }),
      );
    }

    // ─── Shape 12: Shard — broken irregular prism fragment ───
    function CrystalShard(hu, s, l) {
      const id = uid();
      return h("svg", { viewBox: "0 0 50 140", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `sh${id}` }, h("feGaussianBlur", { stdDeviation: "2" })),
          h("filter", { id: `sh2${id}` }, h("feGaussianBlur", { stdDeviation: "0.8" })),
        ),
        // Irregular broken faces — no clean termination
        h("polygon", { points: "8,130 5,55 18,8 25,22 22,130", fill: `hsla(${hu},${Math.min(s+18,100)}%,88%,0.72)` }),
        h("polygon", { points: "22,130 25,22 42,35 40,130", fill: `hsla(${hu+10},${s}%,55%,0.62)` }),
        h("polygon", { points: "5,55 18,8 25,22", fill: `hsla(${hu},${s+10}%,94%,0.88)` }),
        h("polygon", { points: "25,22 42,35 38,28", fill: `hsla(${hu+15},${Math.max(s-5,10)}%,38%,0.7)` }),
        // Fracture face — flat broken surface at top
        h("polygon", { points: "18,8 25,22 38,28 30,5", fill: `hsla(${hu+5},${s+5}%,72%,0.8)` }),
        // Edges
        h("line", { x1: 22, y1: 130, x2: 25, y2: 22, stroke: "white", strokeWidth: 0.7, opacity: 0.33 }),
        h("line", { x1: 5, y1: 55, x2: 18, y2: 8, stroke: "white", strokeWidth: 0.6, opacity: 0.3 }),
        h("line", { x1: 18, y1: 8, x2: 30, y2: 5, stroke: "white", strokeWidth: 0.5, opacity: 0.27 }),
        h("line", { x1: 25, y1: 22, x2: 38, y2: 28, stroke: "white", strokeWidth: 0.5, opacity: 0.24 }),
        // Sweep on lit face
        h("polygon", { className: "crystal-sweep", points: "10,58 18,12 24,25 14,70", fill: "white", opacity: 0.45 }),
        // Subtle glow at fracture
        h("circle", { cx: 24, cy: 16, r: 1.5, fill: "white", opacity: 0.5 }),
        h("circle", { cx: 24, cy: 16, r: 3, fill: "white", opacity: 0.2, filter: `url(#sh${id})` }),
        h("circle", { cx: 22, cy: 35, r: 4, fill: "white", opacity: 0, className: "crystal-glint" }),
      );
    }

    // Each shape has a render function + natural width/height ratio
    const SHAPES = [
      { fn: CrystalHex,      w: 80,  h: 150 },  // ratio 0.53 — classic column
      { fn: CrystalWedge,    w: 130, h: 130 },  // ratio 1.0  — wide slab
      { fn: CrystalDouble,   w: 50,  h: 200 },  // ratio 0.25 — very tall thin
      { fn: CrystalCluster,  w: 140, h: 140 },  // ratio 1.0  — wide cluster
      { fn: CrystalDiamond,  w: 110, h: 100 },  // ratio 1.1  — wider than tall
      { fn: CrystalBent,     w: 100, h: 160 },  // ratio 0.63 — medium
      { fn: CrystalTower,    w: 80,  h: 200 },  // ratio 0.4  — tall stepped
      { fn: CrystalTwin,     w: 120, h: 130 },  // ratio 0.92 — wide pair
      { fn: CrystalShard,    w: 40,  h: 180 },  // ratio 0.22 — thinnest
    ];

    function generateStones(count, palette, seed) {
      const rand = makeRand(seed);
      const stones = [];
      const placed = []; // Poisson-disk rejection
      for (const cls of SIZE_CLASSES) {
        const n = Math.round(count * cls.fraction);
        const minDist = 5 * (cls.scaleMin + 0.4); // bigger crystals need more space
        for (let i = 0; i < n; i++) {
          let top, left, attempts = 0;
          do {
            top = rand() * 100;
            left = rand() * 100;
            attempts++;
          } while (attempts < 25 && placed.some(p => {
            const dt = top - p[0], dl = left - p[1];
            return Math.sqrt(dt * dt + dl * dl) < minDist;
          }));
          placed.push([top, left]);
          const color = palette[Math.floor(rand() * palette.length)];
          stones.push({
            top, left,
            scale: cls.scaleMin + rand() * (cls.scaleMax - cls.scaleMin),
            stretch: 0.35 + rand() * 1.8, // 0.35–2.15 — thin sheets to chunky blocks
            rotation: -25 + rand() * 50,
            opacity: cls.opacityMin + rand() * (cls.opacityMax - cls.opacityMin),
            hsl: hexToHsl(color),
            shape: Math.floor(rand() * SHAPES.length),
            flip: rand() > 0.5,
            breatheDelay: -rand() * 5,
            hueShift: -15 + rand() * 30, // ±15° hue nudge per stone
          });
        }
      }
      return stones;
    }

    function Crystals({ count = 40, palette = PALETTE, seed = 42, intensity = 1, lightPosition = 0.4 }) {
      const ref = useRef(null);
      const stones = useMemo(() => generateStones(count, palette, seed), [count, palette, seed]);

      useEffect(() => {
        const wrapper = ref.current;
        if (!wrapper) return;
        const els = wrapper.querySelectorAll("[data-crystal]");
        // Cache glint NodeLists once at mount instead of querySelectorAll every frame
        const glintMap = new Map();
        els.forEach(el => glintMap.set(el, el.querySelectorAll(".crystal-glint")));
        let ticking = false;
        const onScroll = () => {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(() => {
            const vh = window.innerHeight;
            const lightY = vh * lightPosition;
            const catchRadius = vh * 0.18;
            els.forEach(el => {
              const rect = el.getBoundingClientRect();
              const center = rect.top + rect.height / 2;
              const signed = (center - lightY) / catchRadius;
              const dist = Math.abs(center - lightY);
              const sClamped = Math.max(-1.2, Math.min(1.2, signed));
              el.style.setProperty("--glint-s", sClamped.toFixed(3));
              const glints = glintMap.get(el);
              if (dist < catchRadius) {
                const t = 1 - dist / catchRadius;
                const tt = t * t;
                el.style.setProperty("--glint-t", tt.toFixed(3));
                el.classList.add("is-lit");
                glints.forEach(g => {
                  g.style.opacity = String(tt * 0.95);
                  g.style.transform = `scale(${1 + tt * 3})`;
                });
              } else {
                el.style.setProperty("--glint-t", "0");
                el.classList.remove("is-lit");
                glints.forEach(g => {
                  g.style.opacity = "0"; g.style.transform = "scale(1)";
                });
              }
            });
            ticking = false;
          });
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener("scroll", onScroll);
      }, [lightPosition]);

      return h("div", { ref, "aria-hidden": true, style: { position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none" } },
        stones.map((s, i) => {
          const [hu0, sat, l] = s.hsl;
          const hu = hu0 + (s.hueShift || 0); // per-stone hue nudge
          const shape = SHAPES[s.shape];
          const baseH = 110;
          const baseW = baseH * (shape.w / shape.h) * (s.stretch || 1);
          const sx = s.flip ? -s.scale : s.scale;
          return h("div", {
            key: i, "data-crystal": true, className: "crystal-container",
            style: {
              position: "absolute", top: s.top+"%", left: s.left+"%",
              transform: `rotate(${s.rotation}deg) scale(${sx}, ${s.scale})`,
              opacity: s.opacity * intensity,
              width: baseW+"px", height: baseH+"px",
              "--glint-hue": hu,
              "--breathe-delay": s.breatheDelay + "s",
            }
          }, h("div", { className: "crystal-spin", style: { width: "100%", height: "100%" } },
            shape.fn(hu, Math.max(sat, 15), l)));
        })
      );
    }

    function App() {
      return h("div", { style: { position: "relative", minHeight: "400vh" } },
        h(Crystals, { count: 80, seed: 99 }),
      );
    }

    if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
    window.scrollTo(0, 0);
    createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
