<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crystals Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Georgia, serif; background: #0a0a14; color: #e0e0e0; position: relative; }
    .page { position: relative; min-height: 400vh; }
    .section {
      position: relative; z-index: 2;
      max-width: 600px; margin: 0 auto; padding: 15vh 2rem; text-align: center;
    }
    h1 { font-size: 3rem; font-style: italic; letter-spacing: -0.02em; margin-bottom: 1rem; }
    p  { font-size: 1.1rem; line-height: 1.7; opacity: 0.7; }
    .hint { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); font-size: 0.8rem; opacity: 0.4; z-index: 10; }
    .crystal-glint { transition: opacity 0.25s ease-out, transform 0.25s ease-out; transform-origin: center; }
    @keyframes crystal-breathe { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.12); } }
    .crystal-gem { animation: crystal-breathe 4s ease-in-out infinite; }
    @media (prefers-reduced-motion: reduce) {
      .crystal-gem { animation: none; }
      .crystal-glint { transition: none; }
    }
  </style>
</head>
<body>
  <div class="page" id="root"></div>
  <div class="hint">scroll to see them catch the light</div>
  <script type="module">
    import { createRoot } from "https://esm.sh/react-dom@19/client";
    import { createElement as h, useEffect, useRef } from "https://esm.sh/react@19";

    // Rich multi-color palette: amethyst, rose quartz, clear, citrine, aquamarine, emerald, sapphire, moonstone
    const PALETTE = [
      "#b060d8", "#d088c0", "#e0d8f0",  // purples / rose
      "#f0e0a0", "#e8c870", "#f0c860",  // warm golds / citrine
      "#60d0e8", "#80e0f0", "#50b8d8",  // aquamarine
      "#70e8a0", "#48c878", "#90f0b8",  // emerald
      "#e8e8f8", "#f0f0ff", "#d0d0e8",  // clear / moonstone
      "#6080e8", "#8090f0",             // sapphire
    ];

    const SIZE_CLASSES = [
      { fraction: 0.35, scaleMin: 0.25, scaleMax: 0.55, opacityMin: 0.35, opacityMax: 0.6 },
      { fraction: 0.30, scaleMin: 0.5, scaleMax: 0.85, opacityMin: 0.45, opacityMax: 0.75 },
      { fraction: 0.22, scaleMin: 0.8, scaleMax: 1.4, opacityMin: 0.55, opacityMax: 0.9 },
      { fraction: 0.13, scaleMin: 1.3, scaleMax: 2.2, opacityMin: 0.65, opacityMax: 1.0 },
    ];

    function makeRand(seed) {
      let s = seed;
      return () => { s |= 0; s = (s + 0x6d2b79f5) | 0; let t = Math.imul(s ^ (s >>> 15), 1 | s); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };
    }

    function hexToHsl(hex) {
      const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
      const max = Math.max(r,g,b), min = Math.min(r,g,b), lum = (max+min)/2;
      if (max===min) return [0,0,lum*100];
      const d = max-min, sat = lum>0.5 ? d/(2-max-min) : d/(max+min);
      let hu = 0;
      if (max===r) hu=((g-b)/d+(g<b?6:0))/6; else if (max===g) hu=((b-r)/d+2)/6; else hu=((r-g)/d+4)/6;
      return [hu*360, sat*100, lum*100];
    }

    // Helper: unique ID per crystal instance
    let _uid = 0;
    function uid() { return 'c' + (_uid++); }

    // ─── Shape 1: Classic hexagonal prism with termination point ───
    function CrystalHex(hu, s, l) {
      const id = uid();
      return h("svg", { viewBox: "0 0 80 150", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `gb${id}` }, h("feGaussianBlur", { stdDeviation: "2.5" })),
          h("filter", { id: `gb2${id}` }, h("feGaussianBlur", { stdDeviation: "1" })),
          h("filter", { id: `gb3${id}` }, h("feGaussianBlur", { stdDeviation: "4" })),
          // Glass gradient — left face (bright, transparent)
          h("linearGradient", { id: `gL${id}`, x1: "0%", y1: "0%", x2: "80%", y2: "100%" },
            h("stop", { offset: "0%", stopColor: `hsla(${hu},${Math.min(s+20,100)}%,94%,0.85)` }),
            h("stop", { offset: "40%", stopColor: `hsla(${hu},${s+10}%,80%,0.6)` }),
            h("stop", { offset: "100%", stopColor: `hsla(${hu},${s}%,55%,0.45)` }),
          ),
          // Glass gradient — center face
          h("linearGradient", { id: `gC${id}`, x1: "20%", y1: "0%", x2: "80%", y2: "100%" },
            h("stop", { offset: "0%", stopColor: `hsla(${hu+5},${s+5}%,82%,0.55)` }),
            h("stop", { offset: "50%", stopColor: `hsla(${hu+10},${s}%,60%,0.4)` }),
            h("stop", { offset: "100%", stopColor: `hsla(${hu+15},${s-5}%,38%,0.5)` }),
          ),
          // Glass gradient — right face (dark, still glassy)
          h("linearGradient", { id: `gR${id}`, x1: "100%", y1: "0%", x2: "0%", y2: "80%" },
            h("stop", { offset: "0%", stopColor: `hsla(${hu+20},${s}%,42%,0.55)` }),
            h("stop", { offset: "100%", stopColor: `hsla(${hu+25},${s-10}%,15%,0.7)` }),
          ),
          // Specular gradient for point
          h("linearGradient", { id: `gP${id}`, x1: "30%", y1: "100%", x2: "60%", y2: "0%" },
            h("stop", { offset: "0%", stopColor: `hsla(${hu},${s}%,70%,0.7)` }),
            h("stop", { offset: "50%", stopColor: `hsla(${hu-10},${s+15}%,92%,0.9)` }),
            h("stop", { offset: "100%", stopColor: "rgba(255,255,255,0.98)" }),
          ),
        ),
        // ── Ambient glow beneath
        h("ellipse", { cx: 38, cy: 80, rx: 25, ry: 55, fill: `hsla(${hu},60%,65%,0.08)`, filter: `url(#gb3${id})` }),
        // ── Deep internal refraction (visible through the glass)
        h("polygon", { points: "18,125 18,52 28,46 28,125", fill: `hsla(${hu+5},55%,88%,0.12)`, filter: `url(#gb${id})` }),
        h("polygon", { points: "30,120 42,48 50,55 38,120", fill: `hsla(${hu-10},50%,85%,0.08)`, filter: `url(#gb${id})` }),
        h("ellipse", { cx: 34, cy: 85, rx: 8, ry: 18, fill: `hsla(${hu},45%,90%,0.1)`, filter: `url(#gb${id})` }),
        // Internal rainbow caustic
        h("line", { x1: 20, y1: 50, x2: 50, y2: 120, stroke: `hsla(${(hu+180)%360},40%,80%,0.08)`, strokeWidth: 3, filter: `url(#gb${id})` }),
        // ── Column faces (glass-like low opacity)
        h("polygon", { points: "12,130 12,46 28,38 28,130", fill: `url(#gL${id})` }),
        h("polygon", { points: "28,130 28,38 54,42 54,130", fill: `url(#gC${id})` }),
        h("polygon", { points: "54,130 54,42 66,50 66,130", fill: `url(#gR${id})` }),
        // ── Termination point facets
        h("polygon", { points: "12,46 28,38 38,6", fill: `url(#gP${id})` }),
        h("polygon", { points: "28,38 54,42 38,6", fill: `hsla(${hu+5},${s+8}%,80%,0.65)` }),
        h("polygon", { points: "54,42 66,50 38,6", fill: `hsla(${hu+25},${s-8}%,20%,0.6)` }),
        // ── Edge highlights — sharp white + soft bloom
        h("line", { x1: 28, y1: 130, x2: 28, y2: 38, stroke: "white", strokeWidth: 1.2, opacity: 0.75 }),
        h("line", { x1: 28, y1: 130, x2: 28, y2: 38, stroke: `hsla(${hu},60%,92%,0.35)`, strokeWidth: 4, filter: `url(#gb2${id})` }),
        h("line", { x1: 54, y1: 130, x2: 54, y2: 42, stroke: "white", strokeWidth: 0.6, opacity: 0.35 }),
        h("line", { x1: 28, y1: 38, x2: 38, y2: 6, stroke: "white", strokeWidth: 1.1, opacity: 0.9 }),
        h("line", { x1: 28, y1: 38, x2: 38, y2: 6, stroke: `hsla(${hu},60%,95%,0.4)`, strokeWidth: 3, filter: `url(#gb2${id})` }),
        h("line", { x1: 12, y1: 46, x2: 38, y2: 6, stroke: "white", strokeWidth: 0.7, opacity: 0.5 }),
        h("line", { x1: 12, y1: 46, x2: 28, y2: 38, stroke: "white", strokeWidth: 0.5, opacity: 0.4 }),
        // ── Specular highlight — large bright patch on lit face
        h("polygon", { points: "16,50 29,38 32,20 20,42", fill: "white", opacity: 0.7 }),
        h("polygon", { points: "17,48 28,39 30,24 21,43", fill: "white", opacity: 0.3, filter: `url(#gb2${id})` }),
        // Thin specular streak down column
        h("polygon", { points: "17,50 22,48 22,95 17,98", fill: "white", opacity: 0.12, filter: `url(#gb2${id})` }),
        // ── Blazing tip glow
        h("circle", { cx: 37, cy: 9, r: 3.5, fill: "white" }),
        h("circle", { cx: 37, cy: 9, r: 8, fill: "white", opacity: 0.35, filter: `url(#gb${id})` }),
        h("circle", { cx: 37, cy: 9, r: 16, fill: `hsla(${hu},55%,92%,0.1)`, filter: `url(#gb3${id})` }),
        // Star sparkle
        h("line", { x1: 37, y1: 0, x2: 37, y2: 18, stroke: "white", strokeWidth: 0.6, opacity: 0.7 }),
        h("line", { x1: 28, y1: 9, x2: 46, y2: 9, stroke: "white", strokeWidth: 0.6, opacity: 0.7 }),
        h("line", { x1: 31, y1: 3, x2: 43, y2: 15, stroke: "white", strokeWidth: 0.35, opacity: 0.4 }),
        h("line", { x1: 43, y1: 3, x2: 31, y2: 15, stroke: "white", strokeWidth: 0.35, opacity: 0.4 }),
        // ── Prismatic color fringe along bright edge
        h("line", { x1: 29, y1: 38, x2: 39, y2: 6, stroke: `hsla(300,50%,80%,0.18)`, strokeWidth: 2, filter: `url(#gb2${id})` }),
        h("line", { x1: 27, y1: 38, x2: 37, y2: 6, stroke: `hsla(55,60%,85%,0.12)`, strokeWidth: 1.5, filter: `url(#gb2${id})` }),
        // Random sparkle on face
        h("circle", { cx: 20, cy: 65, r: 1.5, fill: "white", opacity: 0.5 }),
        h("circle", { cx: 20, cy: 65, r: 3.5, fill: "white", opacity: 0.15, filter: `url(#gb${id})` }),
        h("circle", { cx: 48, cy: 90, r: 1, fill: "white", opacity: 0.35 }),
        // Glint target
        h("circle", { cx: 28, cy: 36, r: 5, fill: "white", opacity: 0, className: "crystal-glint" }),
      );
    }

    // ─── Shape 2: Slender needle / prismatic wand ───
    function CrystalNeedle(hu, s, l) {
      const id = uid();
      return h("svg", { viewBox: "0 0 36 160", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `nb${id}` }, h("feGaussianBlur", { stdDeviation: "2" })),
          h("filter", { id: `nb2${id}` }, h("feGaussianBlur", { stdDeviation: "0.8" })),
          h("filter", { id: `nb3${id}` }, h("feGaussianBlur", { stdDeviation: "4" })),
        ),
        h("ellipse", { cx: 18, cy: 80, rx: 14, ry: 60, fill: `hsla(${hu},55%,60%,0.06)`, filter: `url(#nb3${id})` }),
        // Internals
        h("polygon", { points: "9,140 9,38 14,30 14,140", fill: `hsla(${hu},55%,88%,0.1)`, filter: `url(#nb${id})` }),
        // Faces — glassy
        h("polygon", { points: "5,145 5,32 14,24 14,145", fill: `hsla(${hu},${Math.min(s+20,100)}%,90%,0.7)` }),
        h("polygon", { points: "14,145 14,24 26,28 26,145", fill: `hsla(${hu+8},${s}%,58%,0.45)` }),
        h("polygon", { points: "26,145 26,28 31,35 31,145", fill: `hsla(${hu+22},${s-8}%,18%,0.65)` }),
        // Point
        h("polygon", { points: "5,32 14,24 18,2", fill: `hsla(${hu},${s+10}%,95%,0.9)` }),
        h("polygon", { points: "14,24 26,28 18,2", fill: `hsla(${hu+5},${s}%,75%,0.65)` }),
        h("polygon", { points: "26,28 31,35 18,2", fill: `hsla(${hu+20},${s-5}%,22%,0.6)` }),
        // Edges
        h("line", { x1: 14, y1: 145, x2: 14, y2: 24, stroke: "white", strokeWidth: 1, opacity: 0.7 }),
        h("line", { x1: 14, y1: 145, x2: 14, y2: 24, stroke: `hsla(${hu},55%,92%,0.3)`, strokeWidth: 3, filter: `url(#nb2${id})` }),
        h("line", { x1: 14, y1: 24, x2: 18, y2: 2, stroke: "white", strokeWidth: 0.9, opacity: 0.85 }),
        h("line", { x1: 5, y1: 32, x2: 18, y2: 2, stroke: "white", strokeWidth: 0.5, opacity: 0.5 }),
        // Specular streak
        h("polygon", { points: "7,35 15,24 15,70 7,75", fill: "white", opacity: 0.15, filter: `url(#nb2${id})` }),
        // Tip
        h("circle", { cx: 17, cy: 5, r: 2.5, fill: "white" }),
        h("circle", { cx: 17, cy: 5, r: 6, fill: "white", opacity: 0.3, filter: `url(#nb${id})` }),
        h("line", { x1: 17, y1: -3, x2: 17, y2: 13, stroke: "white", strokeWidth: 0.5, opacity: 0.6 }),
        h("line", { x1: 10, y1: 5, x2: 24, y2: 5, stroke: "white", strokeWidth: 0.5, opacity: 0.6 }),
        // Prismatic
        h("line", { x1: 15, y1: 24, x2: 19, y2: 2, stroke: `hsla(280,50%,82%,0.15)`, strokeWidth: 1.5, filter: `url(#nb2${id})` }),
        h("circle", { cx: 14, cy: 22, r: 4, fill: "white", opacity: 0, className: "crystal-glint" }),
      );
    }

    // ─── Shape 3: Double-terminated (point on both ends) ───
    function CrystalDouble(hu, s, l) {
      const id = uid();
      return h("svg", { viewBox: "0 0 70 160", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `db${id}` }, h("feGaussianBlur", { stdDeviation: "2.5" })),
          h("filter", { id: `db2${id}` }, h("feGaussianBlur", { stdDeviation: "1" })),
          h("filter", { id: `db3${id}` }, h("feGaussianBlur", { stdDeviation: "4" })),
        ),
        h("ellipse", { cx: 35, cy: 80, rx: 22, ry: 60, fill: `hsla(${hu},55%,60%,0.06)`, filter: `url(#db3${id})` }),
        // Internals
        h("polygon", { points: "16,115 16,45 24,40 24,115", fill: `hsla(${hu},50%,88%,0.1)`, filter: `url(#db${id})` }),
        h("ellipse", { cx: 32, cy: 80, rx: 7, ry: 22, fill: `hsla(${hu},40%,85%,0.08)`, filter: `url(#db${id})` }),
        // Column faces
        h("polygon", { points: "10,120 10,40 24,32 24,120", fill: `hsla(${hu},${Math.min(s+18,100)}%,92%,0.7)` }),
        h("polygon", { points: "24,120 24,32 50,36 50,120", fill: `hsla(${hu+8},${s}%,60%,0.42)` }),
        h("polygon", { points: "50,120 50,36 60,44 60,120", fill: `hsla(${hu+22},${s-8}%,18%,0.6)` }),
        // Top point
        h("polygon", { points: "10,40 24,32 34,5", fill: `hsla(${hu},${s+10}%,95%,0.88)` }),
        h("polygon", { points: "24,32 50,36 34,5", fill: `hsla(${hu+5},${s}%,78%,0.6)` }),
        h("polygon", { points: "50,36 60,44 34,5", fill: `hsla(${hu+22},${s-8}%,20%,0.55)` }),
        // Bottom point
        h("polygon", { points: "10,120 24,120 34,155", fill: `hsla(${hu},${s+5}%,88%,0.65)` }),
        h("polygon", { points: "24,120 50,120 34,155", fill: `hsla(${hu+10},${s-5}%,50%,0.4)` }),
        h("polygon", { points: "50,120 60,120 34,155", fill: `hsla(${hu+22},${s-10}%,14%,0.55)` }),
        // Edges
        h("line", { x1: 24, y1: 120, x2: 24, y2: 32, stroke: "white", strokeWidth: 1.1, opacity: 0.7 }),
        h("line", { x1: 24, y1: 120, x2: 24, y2: 32, stroke: `hsla(${hu},55%,92%,0.3)`, strokeWidth: 3.5, filter: `url(#db2${id})` }),
        h("line", { x1: 24, y1: 32, x2: 34, y2: 5, stroke: "white", strokeWidth: 1, opacity: 0.85 }),
        h("line", { x1: 10, y1: 40, x2: 34, y2: 5, stroke: "white", strokeWidth: 0.6, opacity: 0.45 }),
        h("line", { x1: 24, y1: 120, x2: 34, y2: 155, stroke: "white", strokeWidth: 0.7, opacity: 0.5 }),
        // Specular
        h("polygon", { points: "14,44 25,32 28,18 18,38", fill: "white", opacity: 0.65 }),
        h("polygon", { points: "15,42 24,33 27,22 19,39", fill: "white", opacity: 0.25, filter: `url(#db2${id})` }),
        // Top tip
        h("circle", { cx: 33, cy: 8, r: 3, fill: "white" }),
        h("circle", { cx: 33, cy: 8, r: 7, fill: "white", opacity: 0.3, filter: `url(#db${id})` }),
        h("line", { x1: 33, y1: 0, x2: 33, y2: 16, stroke: "white", strokeWidth: 0.5, opacity: 0.65 }),
        h("line", { x1: 26, y1: 8, x2: 40, y2: 8, stroke: "white", strokeWidth: 0.5, opacity: 0.65 }),
        // Bottom tip (subtler)
        h("circle", { cx: 33, cy: 152, r: 2, fill: "white", opacity: 0.5 }),
        h("circle", { cx: 33, cy: 152, r: 5, fill: "white", opacity: 0.15, filter: `url(#db${id})` }),
        // Prismatic
        h("line", { x1: 25, y1: 32, x2: 35, y2: 5, stroke: `hsla(300,50%,80%,0.16)`, strokeWidth: 2, filter: `url(#db2${id})` }),
        h("line", { x1: 23, y1: 32, x2: 33, y2: 5, stroke: `hsla(55,55%,85%,0.1)`, strokeWidth: 1.5, filter: `url(#db2${id})` }),
        // Face sparkles
        h("circle", { cx: 18, cy: 60, r: 1.2, fill: "white", opacity: 0.45 }),
        h("circle", { cx: 40, cy: 95, r: 0.8, fill: "white", opacity: 0.3 }),
        h("circle", { cx: 24, cy: 30, r: 5, fill: "white", opacity: 0, className: "crystal-glint" }),
      );
    }

    // ─── Shape 4: Tabular / flat plate crystal ───
    function CrystalTabular(hu, s, l) {
      const id = uid();
      return h("svg", { viewBox: "0 0 100 90", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `tb${id}` }, h("feGaussianBlur", { stdDeviation: "2" })),
          h("filter", { id: `tb2${id}` }, h("feGaussianBlur", { stdDeviation: "0.8" })),
          h("filter", { id: `tb3${id}` }, h("feGaussianBlur", { stdDeviation: "3.5" })),
        ),
        h("ellipse", { cx: 50, cy: 50, rx: 40, ry: 30, fill: `hsla(${hu},50%,60%,0.06)`, filter: `url(#tb3${id})` }),
        // Wide flat faces — very glassy/translucent
        h("polygon", { points: "8,65 8,25 42,10 42,65", fill: `hsla(${hu},${Math.min(s+15,100)}%,92%,0.6)` }),
        h("polygon", { points: "42,65 42,10 85,18 85,65", fill: `hsla(${hu+8},${s+5}%,62%,0.35)` }),
        h("polygon", { points: "85,65 85,18 95,28 95,65", fill: `hsla(${hu+20},${s-5}%,20%,0.55)` }),
        // Top facets (shallow termination)
        h("polygon", { points: "8,25 42,10 50,5", fill: `hsla(${hu},${s+12}%,96%,0.85)` }),
        h("polygon", { points: "42,10 85,18 50,5", fill: `hsla(${hu+5},${s}%,80%,0.55)` }),
        h("polygon", { points: "85,18 95,28 50,5", fill: `hsla(${hu+20},${s-5}%,25%,0.5)` }),
        // Internal refraction — a rainbow bar visible through the flat face
        h("rect", { x: 15, y: 30, width: 30, height: 3, rx: 1.5, fill: `hsla(${(hu+120)%360},40%,80%,0.08)`, filter: `url(#tb${id})` }),
        h("rect", { x: 20, y: 45, width: 25, height: 2, rx: 1, fill: `hsla(${(hu+240)%360},35%,82%,0.06)`, filter: `url(#tb${id})` }),
        // Edges
        h("line", { x1: 42, y1: 65, x2: 42, y2: 10, stroke: "white", strokeWidth: 1, opacity: 0.7 }),
        h("line", { x1: 42, y1: 65, x2: 42, y2: 10, stroke: `hsla(${hu},55%,92%,0.3)`, strokeWidth: 3, filter: `url(#tb2${id})` }),
        h("line", { x1: 42, y1: 10, x2: 50, y2: 5, stroke: "white", strokeWidth: 0.9, opacity: 0.8 }),
        h("line", { x1: 8, y1: 25, x2: 50, y2: 5, stroke: "white", strokeWidth: 0.6, opacity: 0.5 }),
        // Big specular patch — flat crystals catch a lot of light
        h("polygon", { points: "12,28 42,12 46,8 16,24", fill: "white", opacity: 0.6 }),
        h("polygon", { points: "14,30 40,14 44,10 18,26", fill: "white", opacity: 0.25, filter: `url(#tb2${id})` }),
        // Wide specular band down face
        h("polygon", { points: "12,30 20,28 20,55 12,58", fill: "white", opacity: 0.1, filter: `url(#tb2${id})` }),
        // Tip glow
        h("circle", { cx: 49, cy: 7, r: 3, fill: "white" }),

    // ─── Shape 6: Round brilliant (top-down, 16 triangles tiling perfectly) ───
    function CrystalRound(hu, s, l) {
      const id = uid();
      const cx = 40, cy = 40, or = 32, ir = 14, n = 8;
      // Compute outer and inner vertex positions (inner rotated by half-step)
      const ov = [], iv = [];
      for (let i = 0; i < n; i++) {
        const ao = (i / n) * Math.PI * 2 - Math.PI / 2;
        const ai = ((i + 0.5) / n) * Math.PI * 2 - Math.PI / 2;
        ov.push([cx + Math.cos(ao) * or, cy + Math.sin(ao) * or]);
        iv.push([cx + Math.cos(ai) * ir, cy + Math.sin(ai) * ir]);
      }
      // 16 triangles: for each i, outer[i]→outer[i+1]→inner[i], then outer[i+1]→inner[i+1]→inner[i]
      const tris = [];
      for (let i = 0; i < n; i++) {
        const ni = (i + 1) % n;
        // Outer triangle (points outward)
        const colA = `hsla(${hu + i * 4},${Math.min(s + 15, 100)}%,${80 - i * 4}%,${0.6 + (i < 3 ? 0.15 : 0)})`;
        tris.push(h("polygon", { key: `a${i}`, points: `${ov[i]} ${ov[ni]} ${iv[i]}`, fill: colA }));
        // Inner triangle (points inward)
        const colB = `hsla(${hu + 10 + i * 3},${s + 5}%,${55 - i * 3}%,${0.45 + (i < 2 ? 0.15 : 0)})`;
        tris.push(h("polygon", { key: `b${i}`, points: `${ov[ni]} ${iv[ni]} ${iv[i]}`, fill: colB }));

      return h("svg", { viewBox: "0 0 80 80", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `rb${id}` }, h("feGaussianBlur", { stdDeviation: "2" })),

        h("polygon", { points: iv.map(p => p.join(",")).join(" "), fill: `hsla(${hu},${Math.min(s + 20, 100)}%,92%,0.7)` }),

        // Facet edges
        ...ov.map((p, i) => h("line", { key: `eo${i}`, x1: p[0], y1: p[1], x2: iv[i][0], y2: iv[i][1], stroke: "white", strokeWidth: 0.5, opacity: 0.3 + (i < 3 ? 0.25 : 0) })),
        ...ov.map((p, i) => h("line", { key: `ei${i}`, x1: p[0], y1: p[1], x2: iv[(i + n - 1) % n][0], y2: iv[(i + n - 1) % n][1], stroke: "white", strokeWidth: 0.4, opacity: 0.2 + (i < 2 ? 0.2 : 0) })),
        // Outer rim
        h("polygon", { points: ov.map(p => p.join(",")).join(" "), fill: "none", stroke: "white", strokeWidth: 0.7, opacity: 0.35 }),
        // Specular on upper-left facets
        h("polygon", { points: `${ov[0]} ${ov[1]} ${iv[0]}`, fill: "white", opacity: 0.55 }),

    }

    // ─── Shape 9: Rough chunk / geode fragment ───
    function CrystalRough(hu, s, l) {
      const id = uid();
      return h("svg", { viewBox: "0 0 90 80", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `chb${id}` }, h("feGaussianBlur", { stdDeviation: "2.5" })),
          h("filter", { id: `chb2${id}` }, h("feGaussianBlur", { stdDeviation: "1" })),
          h("filter", { id: `chb3${id}` }, h("feGaussianBlur", { stdDeviation: "4" })),
        ),
        h("ellipse", { cx: 45, cy: 42, rx: 35, ry: 28, fill: `hsla(${hu},50%,55%,0.06)`, filter: `url(#chb3${id})` }),
        // Irregular outer shape — rough rock
        h("polygon", { points: "15,70 5,45 12,20 30,8 55,5 75,15 85,35 80,60 65,72 40,75", fill: `hsla(${hu+10},${s-10}%,30%,0.5)` }),
        // Lighter face
        h("polygon", { points: "12,20 30,8 55,5 50,30 25,35", fill: `hsla(${hu},${s}%,65%,0.45)` }),
        // Crystal face exposed inside
        h("polygon", { points: "25,35 50,30 60,45 45,55 28,50", fill: `hsla(${hu},${Math.min(s+15,100)}%,85%,0.65)` }),
        h("polygon", { points: "50,30 75,15 70,40 60,45", fill: `hsla(${hu+8},${s+5}%,72%,0.5)` }),
        h("polygon", { points: "60,45 70,40 80,60 65,55", fill: `hsla(${hu+18},${s-5}%,40%,0.45)` }),
        // Internal glow from crystal face
        h("polygon", { points: "30,38 48,33 55,44 42,50 32,46", fill: `hsla(${hu},${s+10}%,90%,0.2)`, filter: `url(#chb${id})` }),
        // Edges on crystal face
        h("line", { x1: 25, y1: 35, x2: 50, y2: 30, stroke: "white", strokeWidth: 0.8, opacity: 0.55 }),
        h("line", { x1: 50, y1: 30, x2: 60, y2: 45, stroke: "white", strokeWidth: 0.7, opacity: 0.45 }),
        h("line", { x1: 25, y1: 35, x2: 28, y2: 50, stroke: "white", strokeWidth: 0.5, opacity: 0.3 }),
        // Specular on the crystal face
        h("polygon", { points: "30,36 46,32 44,38 32,40", fill: "white", opacity: 0.55 }),
        h("polygon", { points: "32,37 44,33 42,38 34,40", fill: "white", opacity: 0.2, filter: `url(#chb2${id})` }),
        // Sparkles on crystal surface
        h("circle", { cx: 40, cy: 38, r: 2, fill: "white" }),
        h("circle", { cx: 40, cy: 38, r: 5, fill: "white", opacity: 0.25, filter: `url(#chb${id})` }),
        h("line", { x1: 40, y1: 32, x2: 40, y2: 44, stroke: "white", strokeWidth: 0.4, opacity: 0.5 }),
        h("line", { x1: 34, y1: 38, x2: 46, y2: 38, stroke: "white", strokeWidth: 0.4, opacity: 0.5 }),
        h("circle", { cx: 54, cy: 36, r: 1.2, fill: "white", opacity: 0.4 }),
        // Prismatic on crystal edge
        h("line", { x1: 26, y1: 35, x2: 51, y2: 30, stroke: `hsla(300,45%,80%,0.12)`, strokeWidth: 1.5, filter: `url(#chb2${id})` }),
        h("circle", { cx: 40, cy: 36, r: 5, fill: "white", opacity: 0, className: "crystal-glint" }),
      );
    }

    // ─── Shape 10: Diamond / octahedron ───
    function CrystalDiamond(hu, s, l) {
      const id = uid();
      return h("svg", { viewBox: "0 0 70 90", className: "crystal-gem" },
        h("defs", null,
          h("filter", { id: `di${id}` }, h("feGaussianBlur", { stdDeviation: "2" })),
          h("filter", { id: `di2${id}` }, h("feGaussianBlur", { stdDeviation: "0.8" })),
          h("filter", { id: `di3${id}` }, h("feGaussianBlur", { stdDeviation: "4" })),
        ),
        h("ellipse", { cx: 35, cy: 45, rx: 25, ry: 35, fill: `hsla(${hu},50%,60%,0.06)`, filter: `url(#di3${id})` }),
        // Top pyramid
        h("polygon", { points: "35,3 8,42 35,48", fill: `hsla(${hu},${Math.min(s+20,100)}%,93%,0.75)` }),
        h("polygon", { points: "35,3 35,48 62,42", fill: `hsla(${hu+8},${s}%,65%,0.45)` }),
        // Right dark sliver
        h("polygon", { points: "35,3 62,42 58,38", fill: `hsla(${hu+20},${s-8}%,25%,0.5)` }),
        // Bottom pyramid (inverted)
        h("polygon", { points: "35,88 8,42 35,48", fill: `hsla(${hu+5},${s+5}%,78%,0.55)` }),
        h("polygon", { points: "35,88 35,48 62,42", fill: `hsla(${hu+18},${s-5}%,35%,0.5)` }),
        // Internal depth
        h("polygon", { points: "20,42 35,20 35,65 20,48", fill: `hsla(${hu},50%,88%,0.1)`, filter: `url(#di${id})` }),
        // Center edge
        h("line", { x1: 8, y1: 42, x2: 62, y2: 42, stroke: "white", strokeWidth: 1, opacity: 0.6 }),
        h("line", { x1: 8, y1: 42, x2: 62, y2: 42, stroke: `hsla(${hu},50%,90%,0.25)`, strokeWidth: 3, filter: `url(#di2${id})` }),
        // Vertical edges
        h("line", { x1: 35, y1: 3, x2: 8, y2: 42, stroke: "white", strokeWidth: 0.7, opacity: 0.5 }),
        h("line", { x1: 35, y1: 3, x2: 62, y2: 42, stroke: "white", strokeWidth: 0.5, opacity: 0.3 }),
        h("line", { x1: 35, y1: 3, x2: 35, y2: 48, stroke: "white", strokeWidth: 0.9, opacity: 0.7 }),
        h("line", { x1: 35, y1: 88, x2: 8, y2: 42, stroke: "white", strokeWidth: 0.5, opacity: 0.3 }),
        h("line", { x1: 35, y1: 88, x2: 35, y2: 48, stroke: "white", strokeWidth: 0.6, opacity: 0.4 }),
        // Big specular on upper-left face
        h("polygon", { points: "18,38 35,8 35,42 12,42", fill: "white", opacity: 0.5 }),
        h("polygon", { points: "20,38 35,12 35,40 14,42", fill: "white", opacity: 0.2, filter: `url(#di2${id})` }),
        // Top tip
        h("circle", { cx: 35, cy: 6, r: 3, fill: "white" }),
        h("circle", { cx: 35, cy: 6, r: 7, fill: "white", opacity: 0.25, filter: `url(#di${id})` }),
        h("line", { x1: 35, y1: 0, x2: 35, y2: 12, stroke: "white", strokeWidth: 0.5, opacity: 0.6 }),
        h("line", { x1: 29, y1: 6, x2: 41, y2: 6, stroke: "white", strokeWidth: 0.5, opacity: 0.6 }),
        // Bottom tip (subtler)
        h("circle", { cx: 35, cy: 85, r: 2, fill: "white", opacity: 0.4 }),
        // Prismatic on center edge
        h("line", { x1: 10, y1: 42, x2: 60, y2: 42, stroke: `hsla(300,45%,80%,0.12)`, strokeWidth: 1.5, filter: `url(#di2${id})` }),
        h("line", { x1: 10, y1: 43, x2: 60, y2: 43, stroke: `hsla(55,50%,85%,0.08)`, strokeWidth: 1, filter: `url(#di2${id})` }),
        // Face sparkles
        h("circle", { cx: 25, cy: 35, r: 1.2, fill: "white", opacity: 0.45 }),
        h("circle", { cx: 42, cy: 55, r: 0.8, fill: "white", opacity: 0.3 }),
        h("circle", { cx: 35, cy: 42, r: 5, fill: "white", opacity: 0, className: "crystal-glint" }),
      );
    }

    // Each shape has a render function + natural width/height ratio
    const SHAPES = [
      { fn: CrystalHex,      w: 80,  h: 150 },
      { fn: CrystalNeedle,   w: 36,  h: 160 },
      { fn: CrystalDouble,   w: 70,  h: 160 },
      { fn: CrystalTabular,  w: 100, h: 90  },
      { fn: CrystalCluster,  w: 100, h: 140 },
      { fn: CrystalRound,    w: 80,  h: 80  },
      { fn: CrystalTeardrop, w: 60,  h: 100 },
      { fn: CrystalOval,     w: 90,  h: 70  },
      { fn: CrystalRough,    w: 90,  h: 80  },
      { fn: CrystalDiamond,  w: 70,  h: 90  },
    ];

    function generateStones(count, palette, seed) {
      const rand = makeRand(seed);
      const stones = [];
      for (const cls of SIZE_CLASSES) {
        const n = Math.round(count * cls.fraction);
        for (let i = 0; i < n; i++) {
          const color = palette[Math.floor(rand() * palette.length)];
          stones.push({
            top: rand()*100, left: rand()*100,
            scale: cls.scaleMin + rand()*(cls.scaleMax-cls.scaleMin),
            rotation: -30 + rand()*60, // crystals usually grow roughly upward
            opacity: cls.opacityMin + rand()*(cls.opacityMax-cls.opacityMin),
            hsl: hexToHsl(color),
            shape: Math.floor(rand()*SHAPES.length),
            flip: rand()>0.5,
          });
        }
      }
      return stones;
    }

    function Crystals({ count = 40, palette = PALETTE, seed = 42, intensity = 1, lightPosition = 0.4 }) {
      const ref = useRef(null);
      const stones = generateStones(count, palette, seed);

      useEffect(() => {
        const wrapper = ref.current;
        if (!wrapper) return;
        const els = wrapper.querySelectorAll("[data-crystal]");
        let ticking = false;
        const onScroll = () => {
          if (ticking) return;
          ticking = true;
          requestAnimationFrame(() => {
            const vh = window.innerHeight;
            const lightY = vh * lightPosition;
            const catchRadius = vh * 0.18;
            els.forEach(el => {
              const rect = el.getBoundingClientRect();
              const center = rect.top + rect.height / 2;
              const dist = Math.abs(center - lightY);
              if (dist < catchRadius) {
                const t = 1 - dist / catchRadius;
                const tt = t * t; // quadratic ease for sharper flash
                el.style.filter = `brightness(${1 + tt * 1.2}) drop-shadow(0 0 ${3 + tt * 18}px rgba(220,240,255,${0.15 + tt * 0.6}))`;
                el.querySelectorAll(".crystal-glint").forEach(g => {
                  g.style.opacity = String(tt * 0.95);
                  g.style.transform = `scale(${1 + tt * 3})`;
                });
              } else {
                el.style.filter = "brightness(1) drop-shadow(0 0 2px rgba(200,230,255,0.08))";
                el.querySelectorAll(".crystal-glint").forEach(g => {
                  g.style.opacity = "0"; g.style.transform = "scale(1)";
                });
              }
            });
            ticking = false;
          });
        };
        window.addEventListener("scroll", onScroll, { passive: true });
        onScroll();
        return () => window.removeEventListener("scroll", onScroll);
      }, [lightPosition]);

      return h("div", { ref, "aria-hidden": true, style: { position: "absolute", inset: 0, overflow: "hidden", pointerEvents: "none" } },
        stones.map((s, i) => {
          const [hu, sat, l] = s.hsl;
          const shape = SHAPES[s.shape];
          // Scale container to match shape's natural aspect ratio
          const baseH = 110;
          const baseW = baseH * (shape.w / shape.h);
          return h("div", {
            key: i, "data-crystal": true,
            style: {
              position: "absolute", top: s.top+"%", left: s.left+"%",
              transform: `rotate(${s.rotation}deg) scale(${s.scale}) ${s.flip?"scaleX(-1)":""}`,
              opacity: s.opacity * intensity,
              width: baseW+"px", height: baseH+"px",
              transition: "filter 0.3s ease-out",
              filter: "brightness(1) drop-shadow(0 0 2px rgba(200,230,255,0.08))",
            }
          }, shape.fn(hu, Math.max(sat, 15), l));
        })
      );
    }

    function App() {
      return h("div", { style: { position: "relative", minHeight: "400vh" } },
        h(Crystals, { count: 45, seed: 99 }),
        h("div", { className: "section" }, h("h1", null, "Crystals"), h("p", null, "Scroll down. Watch them catch the light.")),
        h("div", { className: "section" }, h("h1", null, "Keep going"), h("p", null, "Five crystal forms. Glass-like translucency. White-hot specular highlights.")),
        h("div", { className: "section" }, h("h1", null, "Mineral."), h("p", null, "Amethyst, citrine, aquamarine, emerald, moonstone, sapphire.")),
      );
    }

    createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
